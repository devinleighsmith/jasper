version: '3.4'
services:
  web:
    image: '${COMPOSE_PROJECT_NAME}-web'
    environment:
      - API_URL=${API_URL}
      - USE_SELF_SIGNED_SSL=${USE_SELF_SIGNED_SSL}
      - IpFilterRules=${IpFilterRules}
      - RealIpFrom=${RealIpFrom}
      - WEB_BASE_HREF=${WEB_BASE_HREF}
      - IncludeSiteminderHeaders=${IncludeSiteminderHeaders}
    ports:
      - 8080:8080
    depends_on:
      - api

  web-dev:
    image: '${COMPOSE_PROJECT_NAME}-web-dev'
    environment:
      - API_URL=${API_URL}
      - WEB_BASE_HREF=${WEB_BASE_HREF}
      - DEV_MODE=false
      - NODE_ENV=development
      - NPM_CONFIG_LOGLEVEL=notice
      - VITE_PORT=1339
      - CHOKIDAR_USEPOLLING=true
      - VITE_WS_PROXY_INSECURE=${VITE_WS_PROXY_INSECURE}
      - VITE_WS_PROXY_ORIGIN=${VITE_WS_PROXY_ORIGIN}
      - DEBUG=http-proxy*
    ports:
      - '8080:1339'
    volumes:
      - '${LOCAL_WORKSPACE_FOLDER-..}/web/src:/opt/app-root/src/src'
      - '${LOCAL_WORKSPACE_FOLDER-..}/web/package.json:/opt/app-root/src/package.json'
    depends_on:
      - api

  api:
    image: '${COMPOSE_PROJECT_NAME}-api'
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=${ASPNETCORE_URLS}
      - Auth__AllowSiteMinderUserType=${ALLOW_SITE_MINDER_USER_TYPE}
      - Auth__UserId=${USER_ID}
      - Auth__UserPassword=${USER_PASSWORD}
      - AuthorizerKey=${AuthorizerKey}
      - AWS_API_GATEWAY_API_KEY=${AWS_API_GATEWAY_API_KEY}
      - AWS_API_GATEWAY_URL=${AWS_API_GATEWAY_URL}
      - AZURE__CLIENT_ID=${AZURE_CLIENT_ID}
      - AZURE__CLIENT_SECRET=${AZURE_CLIENT_SECRET}
      - AZURE__SERVICE_ACCOUNT=${AZURE_SERVICE_ACCOUNT}
      - AZURE__TENANT_ID=${AZURE_TENANT_ID}
      - CLAM_AV__HOST=${CLAM_AV_HOST}
      - CLAM_AV__PORT=${CLAM_AV_PORT}
      - DatabaseConnectionString=${DatabaseConnectionString}
      - DataProtectionKeyEncryptionKey=${DataProtectionKeyEncryptionKey}
      - DEFAULT_QUICK_LINKS=${DEFAULT_QUICK_LINKS}
      - DEFAULT_USERS=${DEFAULT_USERS}
      - DOCUMENT_RETRIEVAL_BATCH_SIZE=${DOCUMENT_RETRIEVAL_BATCH_SIZE}
      - FileServicesClient__Password=${FileServicesClientPassword}
      - FileServicesClient__Url=${FileServicesClientUrl}
      - FileServicesClient__Username=${FileServicesClientUsername}
      - JOBS__SYNC_ASSIGNED_CASES_SCHEDULE=${JOBS_SYNC_ASSIGNED_CASES_SCHEDULE}
      - JOBS__SYNC_DOCUMENT_CATEGORIES_SCHEDULE=${JOBS_SYNC_DOCUMENT_CATEGORIES_SCHEDULE}
      - KEY_DOCS_BINDER_REFRESH_HOURS=${KEY_DOCS_BINDER_REFRESH_HOURS}
      - Keycloak__Audience=${KeycloakAudience}
      - Keycloak__Authority=${KeycloakAuthority}
      - Keycloak__Client=${KeycloakClient}
      - Keycloak__PresReqConfId=${KeycloakPresReqConfId}
      - Keycloak__Secret=${KeycloakSecret}
      - Keycloak__VcIdpHint=${KeycloakVcIdpHint}
      - CsoKeycloak__Audience=${CsoKeycloakAudience}
      - CsoKeycloak__Authority=${CsoKeycloakAuthority}
      - CsoKeycloak__ClientId=${CsoKeycloakClient}
      - CsoKeycloak__Secret=${CsoKeycloakSecret}
      - CsoKeycloak__WriteRole=${CsoKeycloakWriteRole}
      - CsoClientKeycloak__Audience=${CsoClientKeycloakAudience}
      - CsoClientKeycloak__Authority=${CsoClientKeycloakAuthority:-https://common-sso.justice.gov.bc.ca/auth/realms/Judiciary}
      - CsoClientKeycloak__Audience=${CsoClientKeycloakAudience:-CSO}
      - CsoClientKeycloak__ClientId=${CsoClientKeycloakClientId:-JASPER-CSO-Mock}
      - CsoClientKeycloak__ServiceAccountSecret=${CsoClientKeycloakSecret:-}
      - CsoClientKeycloak__RefreshSkewSeconds=${CsoClientKeycloakRefreshSkewSeconds:-60}
      - CSO__BaseUrl=${BaseUrl:-http://localhost:5000/api}
      - CSO__ActionUri=${ActionUri:-/MockOrders/action}
      - LocationServicesClient__Password=${LocationServicesClientPassword}
      - LocationServicesClient__Url=${LocationServicesClientUrl}
      - LocationServicesClient__Username=${LocationServicesClientUsername}
      - LookupServicesClient__Password=${LookupServicesClientPassword}
      - LookupServicesClient__Url=${LookupServicesClientUrl}
      - LookupServicesClient__Username=${LookupServicesClientUsername}
      - JOBS__SubmitOrder__RetryCount=${JobsSubmitOrderRetryCount:-2}
      - JOBS__RetrySubmitOrder__CronSchedule=${JobsRetrySubmitOrderCronSchedule:-0 0 * * 0}
      - JOBS__RetrySubmitOrder__MaxRetries=${JobsRetrySubmitOrderMaxRetries:-9}
      - JOBS__FailureEmail__Recipients__0=${JobsFailureEmailRecipient0}
      - JOBS__FailureEmail__Subject=${JobsFailureEmailSubject:-Background job failed}
      - MONGODB_CONNECTION_STRING=${MONGODB_CONNECTION_STRING}
      - MONGODB_NAME=${MONGODB_NAME}
      - MONGODB_PASSWORD=${MONGODB_PASSWORD}
      - MONGODB_PORT=${MONGODB_PORT}
      - MONGODB_SERVER=${MONGODB_SERVER}
      - MONGODB_USER=${MONGODB_USER}
      - NUGET_PACKAGES=/root/.nuget/packages
      - NUTRIENT_BE_LICENSE_KEY=${NUTRIENT_BE_LICENSE_KEY}
      - NUTRIENT_FE_LICENSE_KEY=${NUTRIENT_FE_LICENSE_KEY}
      - ORDER_MAX_REASSIGNMENT_NOTIFICATIONS=${ORDER_MAX_REASSIGNMENT_NOTIFICATIONS}
      - ORDER_MAX_REMINDER_NOTIFICATIONS=${ORDER_MAX_REMINDER_NOTIFICATIONS}
      - ORDER_REASSIGNMENT_THRESHOLD_DAYS=${ORDER_REASSIGNMENT_THRESHOLD_DAYS}
      - ORDER_REMINDER_THRESHOLD_DAYS=${ORDER_REMINDER_THRESHOLD_DAYS}
      - PCSS__JudgeHomeLocationId=${PCSS_JUDGE_HOME_LOCATION_ID}
      - PCSS__JudgeId=${PCSS_JUDGE_ID}
      - PCSS__Password=${PCSS_PASSWORD}
      - PCSS__Url=${PCSS_URL}
      - PCSS__Username=${PCSS_USERNAME}
      - DARS__Password=${DARS_PASSWORD}
      - DARS__Url=${DARS_URL}
      - DARS__Username=${DARS_USERNAME}
      - DARS__LogsheetUrl=${DARS_LOGSHEET_URL}
      - Request__AgencyIdentifierId=${RequestAgencyIdentifierId}
      - Request__ApplicationCd=${RequestApplicationCd}
      - Request__GetUserLoginDefaultAgencyId=${RequestGetUserLoginDefaultAgencyId}
      - Request__PartId=${RequestPartId}
      - RESERVED_JUDGEMENTS__ATTACHMENT_NAME=${RESERVED_JUDGEMENTS_ATTACHMENT_NAME}
      - RESERVED_JUDGEMENTS__SENDER=${RESERVED_JUDGEMENTS_SENDER}
      - RESERVED_JUDGEMENTS__SUBJECT=${RESERVED_JUDGEMENTS_SUBJECT}
      - SiteMinderLogoutUrl=${SiteMinderLogoutUrl}
      - SplunkCollectorId=${SplunkCollectorId}
      - SplunkCollectorUrl=${SplunkCollectorUrl}
      - SplunkToken=${SplunkToken}
      - SUPPORT_ACCOUNT=${SUPPORT_ACCOUNT}
      - UserServicesClient__Password=${UserServicesClientPassword}
      - UserServicesClient__Url=${UserServicesClientUrl}
      - UserServicesClient__Username=${UserServicesClientUsername}
      - CORS_DOMAIN=${CORS_DOMAIN}

    ports:
      - 5000:5000
    volumes:
      - ${LOCAL_WORKSPACE_FOLDER-..}/api/:/opt/app-root/src/api
      - ${LOCAL_WORKSPACE_FOLDER-..}/db/:/opt/app-root/src/db
      - ${LOCAL_WORKSPACE_FOLDER-..}/jc-interface-client/:/opt/app-root/src/jc-interface-client
      - ${LOCAL_WORKSPACE_FOLDER-..}/pcss-client/:/opt/app-root/src/pcss-client
      - ${LOCAL_WORKSPACE_FOLDER-..}/dars-client/:/opt/app-root/src/dars-client
      - ${LOCAL_WORKSPACE_FOLDER-..}/cso-client/:/opt/app-root/src/cso-client
      - api-dev-bin:/opt/app-root/src/api/bin
      - api-dev-obj:/opt/app-root/src/api/obj
      - nuget-packages:/root/.nuget/packages
      - ${LOCAL_WORKSPACE_FOLDER-.}/seed:/opt/app-root/data
    depends_on:
      - db-pg
      - db-mongo

    command: >
      /bin/bash -c "
        echo Waiting for the database service to start up ...;
        dotnet watch run --project /opt/app-root/src/api/api.csproj --urls='http://+:5000';"

  api-2:
    image: '${COMPOSE_PROJECT_NAME}-api'
    environment:
      - NUGET_PACKAGES=/root/.nuget/packages
      - ASPNETCORE_URLS=${ASPNETCORE_URLS}
      - Auth__AllowSiteMinderUserType=${ALLOW_SITE_MINDER_USER_TYPE}
      - Auth__UserId=${USER_ID}
      - Auth__UserPassword=${USER_PASSWORD}
      - AuthorizerKey=${AuthorizerKey}
      - AWS_API_GATEWAY_API_KEY=${AWS_API_GATEWAY_API_KEY}
      - AWS_API_GATEWAY_URL=${AWS_API_GATEWAY_URL}
      - AZURE__CLIENT_ID=${AZURE_CLIENT_ID}
      - AZURE__CLIENT_SECRET=${AZURE_CLIENT_SECRET}
      - AZURE__SERVICE_ACCOUNT=${AZURE_SERVICE_ACCOUNT}
      - AZURE__TENANT_ID=${AZURE_TENANT_ID}
      - DatabaseConnectionString=${DatabaseConnectionString}
      - DataProtectionKeyEncryptionKey=${DataProtectionKeyEncryptionKey}
      - DEFAULT_QUICK_LINKS=${DEFAULT_QUICK_LINKS}
      - DEFAULT_USERS=${DEFAULT_USERS}
      - FileServicesClient__Password=${FileServicesClientPassword}
      - FileServicesClient__Url=${FileServicesClientUrl}
      - FileServicesClient__Username=${FileServicesClientUsername}
      - JOBS__SYNC_ASSIGNED_CASES_SCHEDULE=${JOBS_SYNC_ASSIGNED_CASES_SCHEDULE}
      - JOBS__SYNC_DOCUMENT_CATEGORIES_SCHEDULE=${JOBS_SYNC_DOCUMENT_CATEGORIES_SCHEDULE}
      - KEY_DOCS_BINDER_REFRESH_HOURS=${KEY_DOCS_BINDER_REFRESH_HOURS}
      - Keycloak__Audience=${KeycloakAudience}
      - Keycloak__Authority=${KeycloakAuthority}
      - Keycloak__Client=${KeycloakClient}
      - Keycloak__PresReqConfId=${KeycloakPresReqConfId}
      - Keycloak__Secret=${KeycloakSecret}
      - Keycloak__VcIdpHint=${KeycloakVcIdpHint}
      - CsoKeycloak__Audience=${CsoKeycloakAudience}
      - CsoKeycloak__Authority=${CsoKeycloakAuthority}
      - CsoKeycloak__ClientId=${CsoKeycloakClient}
      - CsoKeycloak__Secret=${CsoKeycloakSecret}
      - CsoKeycloak__WriteRole=${CsoKeycloakWriteRole}
      - CsoClientKeycloak__Authority=${CsoClientKeycloakAuthority:-https://common-sso.justice.gov.bc.ca/auth/realms/Judiciary}
      - CsoClientKeycloak__Audience=${CsoClientKeycloakAudience:-CSO}
      - CsoClientKeycloak__ClientId=${CsoClientKeycloakClientId:-JASPER-CSO-Mock}
      - CsoClientKeycloak__ServiceAccountSecret=${CsoClientKeycloakSecret:-}
      - CsoClientKeycloak__RefreshSkewSeconds=${CsoClientKeycloakRefreshSkewSeconds:-60}
      - CSO__BaseUrl=${BaseUrl:-http://localhost:5000/api}
      - CSO__ActionUri=${ActionUri:-/MockOrders/action}
      - LocationServicesClient__Password=${LocationServicesClientPassword}
      - LocationServicesClient__Url=${LocationServicesClientUrl}
      - LocationServicesClient__Username=${LocationServicesClientUsername}
      - LookupServicesClient__Password=${LookupServicesClientPassword}
      - LookupServicesClient__Url=${LookupServicesClientUrl}
      - LookupServicesClient__Username=${LookupServicesClientUsername}
      - MONGODB_CONNECTION_STRING=${MONGODB_CONNECTION_STRING}
      - MONGODB_NAME=${MONGODB_NAME}
      - MONGODB_PASSWORD=${MONGODB_PASSWORD}
      - MONGODB_PORT=${MONGODB_PORT}
      - MONGODB_SERVER=${MONGODB_SERVER}
      - MONGODB_USER=${MONGODB_USER}
      - PCSS__JudgeHomeLocationId=${PCSS_JUDGE_HOME_LOCATION_ID}
      - PCSS__JudgeId=${PCSS_JUDGE_ID}
      - PCSS__Password=${PCSS_PASSWORD}
      - PCSS__Url=${PCSS_URL}
      - PCSS__Username=${PCSS_USERNAME}
      - DARS__Password=${DARS_PASSWORD}
      - DARS__Url=${DARS_URL}
      - DARS__Username=${DARS_USERNAME}
      - DARS__LogsheetUrl=${DARS_LOGSHEET_URL}
      - Request__AgencyIdentifierId=${RequestAgencyIdentifierId}
      - Request__ApplicationCd=${RequestApplicationCd}
      - Request__GetUserLoginDefaultAgencyId=${RequestGetUserLoginDefaultAgencyId}
      - Request__PartId=${RequestPartId}
      - RESERVED_JUDGEMENTS__ATTACHMENT_NAME=${RESERVED_JUDGEMENTS_ATTACHMENT_NAME}
      - RESERVED_JUDGEMENTS__SENDER=${RESERVED_JUDGEMENTS_SENDER}
      - RESERVED_JUDGEMENTS__SUBJECT=${RESERVED_JUDGEMENTS_SUBJECT}
      - SiteMinderLogoutUrl=${SiteMinderLogoutUrl}
      - SplunkCollectorId=${SplunkCollectorId}
      - SplunkCollectorUrl=${SplunkCollectorUrl}
      - SplunkToken=${SplunkToken}
      - UserServicesClient__Password=${UserServicesClientPassword}
      - UserServicesClient__Url=${UserServicesClientUrl}
      - UserServicesClient__Username=${UserServicesClientUsername}
      - NUTRIENT_BE_LICENSE_KEY=${NUTRIENT_BE_LICENSE_KEY}
      - NUTRIENT_FE_LICENSE_KEY=${NUTRIENT_FE_LICENSE_KEY}
      - CORS_DOMAIN=${CORS_DOMAIN}

    ports:
      - 5001:5000
    volumes:
      - ${LOCAL_WORKSPACE_FOLDER-..}/api/:/opt/app-root/src/api
      - ${LOCAL_WORKSPACE_FOLDER-..}/db/:/opt/app-root/src/db
      - ${LOCAL_WORKSPACE_FOLDER-..}/jc-interface-client/:/opt/app-root/src/jc-interface-client
      - ${LOCAL_WORKSPACE_FOLDER-..}/pcss-client/:/opt/app-root/src/pcss-client
      - ${LOCAL_WORKSPACE_FOLDER-..}/dars-client/:/opt/app-root/src/dars-client
      - ${LOCAL_WORKSPACE_FOLDER-..}/cso-client/:/opt/app-root/src/cso-client
      - api2-dev-bin:/opt/app-root/src/api/bin
      - api2-dev-obj:/opt/app-root/src/api/obj
      - nuget-packages:/root/.nuget/packages
      - ${LOCAL_WORKSPACE_FOLDER-.}/seed:/opt/app-root/data
    depends_on:
      - db-pg
      - db-mongo

    command: >
      /bin/bash -c "
        echo Waiting for the database service to start up ...;
        dotnet watch run --project /opt/app-root/src/api/api.csproj --urls='http://+:5000';"

  db-pg:
    image: centos/postgresql-12-centos8
    environment:
      - POSTGRESQL_USER=${POSTGRESQL_USER}
      - POSTGRESQL_PASSWORD=${POSTGRESQL_PASSWORD}
      - POSTGRESQL_DATABASE=${POSTGRESQL_DATABASE}
      - POSTGRESQL_ADMIN_PASSWORD=${POSTGRESQL_ADMIN_PASSWORD}
    ports:
      - 5432:5432
    volumes:
      - ${LOCAL_WORKSPACE_FOLDER-.}/tmp:/tmp2

  db-mongo:
    image: mongo:latest
    ports:
      - 27017:27017
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_PASSWORD}
    volumes:
      - ${LOCAL_WORKSPACE_FOLDER-.}/tmp-mongo:/tmp-mongo

  clamav:
    image: clamav/clamav@sha256:c6eb128c7bd57bb0c533491198753a2130b471c517605ad8d289174a56c450a8 # v1.5.2
    ports:
      - '3310:3310'
    environment:
      - CLAMAV_NO_FRESHCLAMD=false
    volumes:
      - clamav-db:/var/lib/clamav

volumes:
  api-dev-bin:
  api-dev-obj:
  api2-dev-bin:
  api2-dev-obj:
  nuget-packages:
  clamav-db:
